name: MLP2

# Extension of Tammy's tensorflow environment for the H100
# Attempt to update to the latest version or iris

channels:
  - conda-forge
dependencies:

  - python==3.11
  - pip>=22.3.1
  - pandas>=2.2.2
  - numpy>=2.3
  - scipy>=1.14.0

  # Extras
  - libwebp>=1.3.2 # Earlier versions have a security vulnerability
  - iris>=3.13
  - mo_pack
  - cmocean>=4.0
  - parallel
  # Efficient disc storage
  - zarr>=3.1
  # For convolution with missing data
  - astropy>=5.3
  # Get data from ERA5
  # You'll need to register, see https://cds.climate.copernicus.eu/api-how-to
  - cdsapi>=0.7.2
  # Optional, code formatter
  - black
  # Optional - documentation generator
  - sphinx

  # Azure
  - azure-ai-ml = 1.21
  - azure-identity = 1.17
  - azure-storage-file-datalake = 12.17

  # Some packages are only available via pip
  # Almost certainly I don't need all these, but I have not done the work to prune them.
  - pip
  - pip:
  #   - setuptools==72.1.0
  #   - wheel==0.44.0
  #   - matplotlib>=3.5.0
  #   - psutil~=5.8.0
  #   - tqdm~=4.66.3
  #   - ipykernel~=6.20.2
  #   - azureml-core==1.59.0
  #   - azureml-defaults==1.59.0
  #   - azureml-mlflow==1.59.0.post1
  #   - azureml-telemetry==1.59.0
  #   - tensorboard~=2.16.0
    - tensorflow[and-cuda]==2.16.2
  #   - tensorflow-datasets~=4.9.0
  #   - keras==3.3.2
  #   - tf-keras==2.16.0
  #   - debugpy~=1.6.3
  #   - cryptography>=41.0.4
  #   - idna>=3.0
  #   - scikit-learn
  #   - tensorflow-probability
    - tensorstore
  

# Tell python to look for modules in the root directory of the project
# (A hack, needs to be edited for every installation, but makes code
#  management much easier.)
# Replace with the path to your project directory root.

variables:
  PYTHONPATH: /home/users/philip.brohan/Projects/ML_precipitation_dataset
# Project directory
  PDIR: /data/scratch/philip.brohan/MLP
# Fix really weird error in scipy optimize (loaded by iris)
# This should be $CONDA_ENVS_PATH/DCVAE-Climate/lib
#   but you can't do variable expansion here - so set it for each system.
  LD_LIBRARY_PATH: /data/users/philip.brohan/conda/environments/MLP/lib
# TWCR raw data isn't in SCRATCH on Azure - so we need to set the path
  TWCR_HOURLY: /data/scratch/philip.brohan/20CR/version_3/

# Also the Azure ML subscription, workspace and resource group
  AZML_SUBSCRIPTION_ID: 79c7890c-2a30-44ef-aa8d-419d25b7bb8e
  AZML_WORKSPACE_NAME: mlw-exploratory-uksouth-01
  AZML_RESOURCE_GROUP: rg-climate-ai4climate-exploratory
